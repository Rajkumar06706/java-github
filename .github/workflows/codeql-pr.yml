name: CodeQL Security

on:
  workflow_call:
    inputs:
      java-version:
        required: true
        type: string


jobs:

  code-security:

    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: Rajkumar06706/java-github/actions/setup-java@main
        with:
          java-version: ${{ inputs.java-version }}

      - name: CodeQL Init
        uses: Rajkumar06706/java-github/actions/codeql-init@main

      - name: Compile
        uses: Rajkumar06706/java-github/actions/compile@main

      - name: CodeQL Analyze
        uses: Rajkumar06706/java-github/actions/codeql-analyze@main
