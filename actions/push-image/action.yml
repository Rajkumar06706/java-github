name: Push Image

description: Push OCI image

inputs:
  image-uri:
    required: true

runs:
  using: composite

  steps:

    #- name: Login Registry
     # shell: bash
      #run: |
       # echo "${{ github.token }}" | docker login ghcr.io \
        #  -u ${{ github.actor }} \
         # --password-stdin

    - name: Tag Image
      shell: bash
      run: |
        docker tag app:${GITHUB_SHA} \
        "${{ inputs.image-uri }}"

    - name: Push Image
      shell: bash
      run: |
        docker push "${{ inputs.image-uri }}"
